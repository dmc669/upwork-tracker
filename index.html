<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upwork Bid Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;font-family:'DM Mono',monospace;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ANTHROPIC_MODEL = "claude-haiku-4-5-20251001";

const getKey = () => localStorage.getItem("upwork_anthropic_key") || "";

const callClaude = async (prompt) => {
  const key = getKey();
  if (!key) throw new Error("No API key — click Set API Key first");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: ANTHROPIC_MODEL,
      max_tokens: 1024,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || "").join("").trim();
};

const HEADERS = ["id","date","url","jobText","claudeSummary","claudeHours","complexity","claudePricing","smeHours","bdPrice","connects","proposal","notes","status"];
const STATUS_FLOW = ["New","Under Review","SME Assessed","Proposal Sent","Won","Lost"];
const STATUS_COLORS = {
  "New":           {bg:"#1a1a2e",text:"#7c83ff",border:"#2d2d5e"},
  "Under Review":  {bg:"#1a2a1a",text:"#6fcf97",border:"#2d4d2d"},
  "SME Assessed":  {bg:"#2a1a0e",text:"#f2994a",border:"#4d3520"},
  "Proposal Sent": {bg:"#0e1a2a",text:"#56ccf2",border:"#204050"},
  "Won":           {bg:"#0a2a0a",text:"#27ae60",border:"#1a4d1a"},
  "Lost":          {bg:"#2a0a0a",text:"#eb5757",border:"#4d1a1a"},
};
const CX = {"Low":"#6fcf97","Medium":"#f2994a","High":"#eb5757","—":"#555"};
const LS_KEY = "upwork_tracker_v4";

const lsSave = rows => { try { localStorage.setItem(LS_KEY, JSON.stringify(rows)); } catch(e) {} };
const lsLoad = () => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : []; } catch(e) { return []; } };

const { useState, useEffect, useCallback } = React;

function StatusBadge({ status, onChange }) {
  const [open, setOpen] = useState(false);
  const c = STATUS_COLORS[status] || STATUS_COLORS["New"];
  return (
    <div style={{position:"relative"}}>
      <button onClick={() => setOpen(!open)} style={{background:c.bg,color:c.text,border:"1px solid "+c.border,borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontFamily:"monospace",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{status} ▾</button>
      {open && (
        <div style={{position:"absolute",top:"28px",left:0,zIndex:99,background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",overflow:"hidden",minWidth:"140px",boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
          {STATUS_FLOW.map(s => {
            const sc = STATUS_COLORS[s];
            return <button key={s} onClick={() => { onChange(s); setOpen(false); }} style={{display:"block",width:"100%",textAlign:"left",background:s===status?sc.bg:"transparent",color:sc.text,border:"none",padding:"7px 14px",fontSize:"11px",fontFamily:"monospace",fontWeight:600,cursor:"pointer"}}>{s}</button>;
          })}
        </div>
      )}
    </div>
  );
}

function EditableCell({ value, onChange, placeholder, multiline }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || "");
  const save = () => { onChange(draft); setEditing(false); };
  const baseStyle = {background:"#1a1a1a",color:"#e8e4dc",border:"1px solid #444",borderRadius:"6px",padding:"6px 8px",fontSize:"12px",fontFamily:"monospace",width:"100%",outline:"none",resize:"vertical",boxSizing:"border-box"};
  if (editing) {
    return multiline
      ? <textarea autoFocus rows={3} style={baseStyle} value={draft} onChange={e => setDraft(e.target.value)} onBlur={save}/>
      : <input autoFocus style={baseStyle} value={draft} onChange={e => setDraft(e.target.value)} onBlur={save} onKeyDown={e => e.key === "Enter" && save()}/>;
  }
  return (
    <div onClick={() => { setDraft(value || ""); setEditing(true); }}
      style={{cursor:"text",minHeight:"20px",color:value?"#e8e4dc":"#444",fontSize:"12px",fontFamily:"monospace",lineHeight:"1.5",padding:"2px 4px",borderRadius:"4px"}}
      onMouseEnter={e => e.currentTarget.style.background="#1e1e1e"}
      onMouseLeave={e => e.currentTarget.style.background="transparent"}>
      {value || (placeholder || "—")}
    </div>
  );
}

function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); });
  return (
    <div style={{position:"fixed",bottom:"28px",left:"50%",transform:"translateX(-50%)",background:"#1e1e1e",border:"1px solid #2a2a2a",color:"#e8e4dc",padding:"10px 22px",borderRadius:"10px",fontSize:"12px",fontFamily:"monospace",zIndex:9999,display:"flex",alignItems:"center",gap:"8px"}}>
      <span style={{color:type==="error"?"#eb5757":"#27ae60"}}>{type==="error"?"✕":"✓"}</span>
      {message}
    </div>
  );
}

function ProposalModal({ row, agencyContext, onClose, onSave }) {
  const [text, setText] = useState(row.proposal || "");
  const [loading, setLoading] = useState(!row.proposal);

  const generate = useCallback(async () => {
    setLoading(true);
    setText("");
    try {
      const result = await callClaude(
        "You are a senior bid writer for an automation consultancy. Write a concise persuasive Upwork proposal.\n\n" +
        "AGENCY CONTEXT:\n" + agencyContext + "\n\n" +
        "JOB POST:\n" + row.jobText + "\n\n" +
        (row.claudeSummary ? "ANALYSIS: " + row.claudeSummary + " | Hours: " + row.claudeHours + " | Complexity: " + row.complexity + "\n\n" : "") +
        "RULES: Open with a hook. 2-3 short paragraphs. Professional tone. End with a call to action. No rates. No bullet points. 150-200 words. Return proposal text only."
      );
      setText(result);
    } catch(e) {
      setText("Error: " + e.message);
    }
    setLoading(false);
  }, [row, agencyContext]);

  useEffect(() => { if (!row.proposal) generate(); }, []);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:"16px",padding:"32px",width:"620px",maxWidth:"92vw",maxHeight:"90vh",overflow:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"20px"}}>
          <h2 style={{color:"#e8e4dc",fontFamily:"sans-serif",fontWeight:800,fontSize:"18px"}}>Proposal Draft</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#555",fontSize:"22px",cursor:"pointer"}}>×</button>
        </div>
        {loading
          ? <div style={{display:"flex",alignItems:"center",gap:"12px",padding:"40px",justifyContent:"center"}}>
              <div style={{width:"18px",height:"18px",border:"2px solid #333",borderTop:"2px solid #7c83ff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
              <span style={{color:"#555",fontSize:"12px"}}>Writing proposal…</span>
            </div>
          : <textarea value={text} onChange={e => setText(e.target.value)} rows={12}
              style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"10px",color:"#e8e4dc",padding:"16px",fontSize:"13px",fontFamily:"monospace",lineHeight:"1.8",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
        }
        <div style={{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"20px",flexWrap:"wrap"}}>
          <button onClick={onClose} style={{background:"transparent",color:"#555",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"8px 18px",fontSize:"12px",cursor:"pointer"}}>Cancel</button>
          <button onClick={generate} disabled={loading} style={{background:"#1e1e3a",color:"#7c83ff",border:"1px solid #2d2d5e",borderRadius:"8px",padding:"8px 18px",fontSize:"12px",cursor:"pointer"}}>↺ Regenerate</button>
          <button onClick={() => navigator.clipboard && navigator.clipboard.writeText(text)} style={{background:"#111",color:"#56ccf2",border:"1px solid #1a3040",borderRadius:"8px",padding:"8px 18px",fontSize:"12px",cursor:"pointer"}}>⎘ Copy</button>
          <button onClick={() => { onSave(text); onClose(); }} disabled={!text||loading}
            style={{background:text&&!loading?"#e8e4dc":"#1a1a1a",color:text&&!loading?"#0d0d0d":"#333",border:"none",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:700,cursor:text&&!loading?"pointer":"not-allowed"}}>
            Save →
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [rows, setRows]           = useState(() => lsLoad());
  const [expandedRow, setExpanded]= useState(null);
  const [loadingId, setLoadingId] = useState(null);
  const [showAdd, setShowAdd]     = useState(false);
  const [showKey, setShowKey]     = useState(false);
  const [showAgency, setShowAgency] = useState(false);
  const [showProposal, setShowProposal] = useState(null);
  const [newJob, setNewJob]       = useState({url:"",jobText:"",connects:""});
  const [toast, setToast]         = useState(null);
  const [keyDraft, setKeyDraft]   = useState(() => getKey());
  const [agency, setAgency]       = useState(() => localStorage.getItem("upwork_agency_context") || "");
  const [agencyDraft, setAgencyDraft] = useState(agency);

  const toast$ = (msg, type) => setToast({msg, type});
  const save = updated => { setRows(updated); lsSave(updated); };
  const updateField = (id, field, val) => save(rows.map(r => r.id === id ? {...r, [field]: val} : r));

  const runAnalysis = async (row) => {
    setLoadingId(row.id);
    try {
      const result = await callClaude(
        'Analyse this Upwork job and return ONLY a raw JSON object with keys: "summary" (1-2 sentences), "hours" (e.g. "20-35 hrs"), "complexity" (Low/Medium/High), "pricing" (e.g. "$30-45/hr").\n\nJob:\n' + row.jobText + '\n\nJSON only, no markdown.'
      );
      const clean = result.replace(/```json|```/g, "").trim();
      const p = JSON.parse(clean);
      save(rows.map(r => r.id === row.id ? {...r, claudeSummary:p.summary||"", claudeHours:p.hours||"", complexity:p.complexity||"—", claudePricing:p.pricing||"", status:"Under Review"} : r));
      toast$("Analysis complete", "success");
    } catch(e) {
      toast$("Failed: " + e.message, "error");
    }
    setLoadingId(null);
  };

  const addJob = () => {
    const r = {
      id: String(Date.now()),
      date: new Date().toISOString().slice(0,16).replace("T"," "),
      url: newJob.url, jobText: newJob.jobText,
      claudeSummary:"", claudeHours:"", complexity:"—", claudePricing:"",
      smeHours:"", bdPrice:"", connects: newJob.connects,
      proposal:"", notes:"", status:"New"
    };
    save([r, ...rows]);
    setNewJob({url:"",jobText:"",connects:""});
    setShowAdd(false);
    toast$("Job added", "success");
  };

  const downloadCSV = () => {
    const cols = ["date","url","jobText","claudeSummary","claudeHours","complexity","claudePricing","smeHours","bdPrice","connects","proposal","notes","status"];
    const heads = ["Date","URL","Job Post","Summary","Hours","Complexity","Rate","SME Hours","BD Price","Connects","Proposal","Notes","Status"];
    const esc = v => '"' + String(v||"").replace(/"/g,'""') + '"';
    const lines = [heads.map(esc).join(","), ...rows.map(r => cols.map(c => esc(r[c])).join(","))];
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([lines.join("\n")], {type:"text/csv"}));
    a.download = "upwork-tracker-" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    toast$("CSV downloaded", "success");
  };

  const hasKey = !!getKey();
  const COLS = ["DATE","URL","JOB POST","SUMMARY","HOURS","COMPLEXITY","RATE","SME HRS","BD PRICE","CONNECTS","PROPOSAL","NOTES","STATUS","AI"];

  return (
    <div style={{minHeight:"100vh",background:"#0d0d0d",color:"#e8e4dc",padding:"28px 20px",fontFamily:"monospace"}}>

      {/* HEADER */}
      <div style={{marginBottom:"24px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"16px"}}>
        <div>
          <div style={{color:"#444",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"4px"}}>AUTOMATION CONSULTANCY</div>
          <div style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em",fontFamily:"sans-serif"}}>Upwork Bid Tracker</div>
          <div style={{color:"#555",fontSize:"11px",marginTop:"4px"}}>{rows.length} jobs · browser storage</div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center"}}>
          {STATUS_FLOW.map(s => (
            <span key={s} style={{background:STATUS_COLORS[s].bg,color:STATUS_COLORS[s].text,border:"1px solid "+STATUS_COLORS[s].border,borderRadius:"20px",padding:"3px 9px",fontSize:"10px",fontWeight:600}}>
              {rows.filter(r=>r.status===s).length} {s}
            </span>
          ))}
          <button onClick={() => setShowKey(true)} style={{background:hasKey?"#111":"#2a1a0e",color:hasKey?"#666":"#f2994a",border:"1px solid "+(hasKey?"#2a2a2a":"#4d3520"),borderRadius:"8px",padding:"7px 14px",fontSize:"11px",cursor:"pointer"}}>
            {hasKey ? "⚙ API Key" : "⚠ Set API Key"}
          </button>
          <button onClick={() => { setAgencyDraft(agency); setShowAgency(true); }} style={{background:"#111",color:"#888",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"7px 14px",fontSize:"11px",cursor:"pointer"}}>
            ✎ Agency
          </button>
          <button onClick={downloadCSV} style={{background:"#111",color:"#56ccf2",border:"1px solid #1a3040",borderRadius:"8px",padding:"7px 14px",fontSize:"11px",cursor:"pointer"}}>↓ CSV</button>
          <button onClick={() => setShowAdd(true)} style={{background:"#e8e4dc",color:"#0d0d0d",border:"none",borderRadius:"8px",padding:"7px 16px",fontSize:"12px",fontWeight:700,cursor:"pointer"}}>+ Add Job</button>
        </div>
      </div>

      {/* TABLE */}
      <div style={{overflowX:"auto",borderRadius:"10px",border:"1px solid #1e1e1e"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:"1400px"}}>
          <thead>
            <tr style={{background:"#111"}}>
              {COLS.map(c => <th key={c} style={{padding:"9px 11px",textAlign:"left",fontSize:"9px",color:"#555",letterSpacing:"0.12em",fontWeight:600,borderBottom:"1px solid #1e1e1e",whiteSpace:"nowrap"}}>{c}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={14} style={{padding:"48px",textAlign:"center",color:"#333",fontSize:"13px"}}>No jobs yet — click + Add Job</td></tr>
            )}
            {rows.map((row, i) => (
              <React.Fragment key={row.id}>
                <tr style={{background:i%2===0?"#0d0d0d":"#101010",borderBottom:expandedRow===row.id?"none":"1px solid #181818"}}>
                  <td style={{padding:"9px 11px",color:"#444",fontSize:"11px",whiteSpace:"nowrap"}}>{row.date}</td>
                  <td style={{padding:"9px 11px",maxWidth:"90px"}}><EditableCell value={row.url} onChange={v=>updateField(row.id,"url",v)} placeholder="URL"/></td>
                  <td style={{padding:"9px 11px",maxWidth:"180px"}}>
                    <div style={{cursor:"pointer",color:row.jobText?"#e8e4dc":"#444",fontSize:"12px",lineHeight:"1.4"}} onClick={()=>setExpanded(expandedRow===row.id?null:row.id)}>
                      {row.jobText ? row.jobText.slice(0,70)+(row.jobText.length>70?"…":"") : "click to expand & add"}
                    </div>
                  </td>
                  <td style={{padding:"9px 11px",maxWidth:"180px"}}><EditableCell value={row.claudeSummary} onChange={v=>updateField(row.id,"claudeSummary",v)} placeholder="run AI →" multiline={true}/></td>
                  <td style={{padding:"9px 11px"}}><span style={{color:row.claudeHours?"#c9b8ff":"#333",fontSize:"12px"}}>{row.claudeHours||"—"}</span></td>
                  <td style={{padding:"9px 11px"}}><span style={{color:CX[row.complexity]||"#555",fontSize:"11px",fontWeight:600}}>{row.complexity||"—"}</span></td>
                  <td style={{padding:"9px 11px"}}><span style={{color:row.claudePricing?"#6fcf97":"#333",fontSize:"12px"}}>{row.claudePricing||"—"}</span></td>
                  <td style={{padding:"9px 11px"}}><EditableCell value={row.smeHours} onChange={v=>updateField(row.id,"smeHours",v)} placeholder="hrs"/></td>
                  <td style={{padding:"9px 11px"}}><EditableCell value={row.bdPrice} onChange={v=>updateField(row.id,"bdPrice",v)} placeholder="$40/hr"/></td>
                  <td style={{padding:"9px 11px"}}><EditableCell value={row.connects} onChange={v=>updateField(row.id,"connects",v)} placeholder="—"/></td>
                  <td style={{padding:"9px 11px"}}>
                    <button onClick={()=>setShowProposal(row)} disabled={!row.jobText}
                      style={{background:row.proposal?"#0a2a0a":"#1e1e3a",color:row.proposal?"#27ae60":"#7c83ff",border:"1px solid "+(row.proposal?"#1a4d1a":"#2d2d5e"),borderRadius:"6px",padding:"4px 10px",fontSize:"10px",cursor:row.jobText?"pointer":"not-allowed",whiteSpace:"nowrap"}}>
                      {row.proposal?"✓ Edit":"✦ Draft"}
                    </button>
                  </td>
                  <td style={{padding:"9px 11px",maxWidth:"150px"}}><EditableCell value={row.notes} onChange={v=>updateField(row.id,"notes",v)} placeholder="notes…" multiline={true}/></td>
                  <td style={{padding:"9px 11px"}}><StatusBadge status={row.status} onChange={v=>updateField(row.id,"status",v)}/></td>
                  <td style={{padding:"9px 11px"}}>
                    <button onClick={()=>runAnalysis(row)} disabled={!row.jobText||loadingId===row.id}
                      style={{background:loadingId===row.id?"#1a1a2e":"#1e1e3a",color:loadingId===row.id?"#7c83ff88":"#7c83ff",border:"1px solid #2d2d5e",borderRadius:"6px",padding:"5px 10px",fontSize:"10px",cursor:row.jobText&&loadingId!==row.id?"pointer":"not-allowed"}}>
                      {loadingId===row.id?"…":"✦"}
                    </button>
                  </td>
                </tr>
                {expandedRow===row.id && (
                  <tr style={{background:"#0a0a12",borderBottom:"1px solid #1e1e1e"}}>
                    <td colSpan={14} style={{padding:"20px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"24px"}}>
                        <div>
                          <div style={{color:"#555",fontSize:"9px",letterSpacing:"0.15em",marginBottom:"8px"}}>FULL JOB POST</div>
                          <textarea value={row.jobText} onChange={e=>updateField(row.id,"jobText",e.target.value)} rows={7}
                            style={{width:"100%",background:"#111",border:"1px solid #222",borderRadius:"8px",color:"#e8e4dc",fontSize:"12px",fontFamily:"monospace",padding:"12px",resize:"vertical",outline:"none",lineHeight:"1.7"}}/>
                        </div>
                        <div>
                          <div style={{color:"#555",fontSize:"9px",letterSpacing:"0.15em",marginBottom:"12px"}}>PIPELINE CHECKLIST</div>
                          {[
                            {l:"BD added job post",          d:!!row.jobText},
                            {l:"Claude analysis run",        d:!!row.claudeSummary},
                            {l:"Connects logged",            d:!!row.connects},,
                            {l:"SME reviewed & added hours", d:!!row.smeHours},
                            {l:"BD set final price",         d:!!row.bdPrice},
                            {l:"Proposal drafted",           d:!!row.proposal},
                            {l:"Proposal submitted",         d:["Proposal Sent","Won","Lost"].includes(row.status)},
                          ].map(step => (
                            <div key={step.l} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
                              <span style={{width:"16px",height:"16px",borderRadius:"4px",background:step.d?"#0a2a0a":"#1a1a1a",border:"1px solid "+(step.d?"#27ae60":"#2a2a2a"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:step.d?"#27ae60":"#333",flexShrink:0}}>{step.d?"✓":""}</span>
                              <span style={{color:step.d?"#666":"#444",fontSize:"12px",textDecoration:step.d?"line-through":"none"}}>{step.l}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{color:"#222",fontSize:"10px",marginTop:"14px",textAlign:"center",letterSpacing:"0.1em"}}>
        CLICK ANY CELL TO EDIT · CLICK JOB SNIPPET TO EXPAND · ✦ ANALYSE · ✦ DRAFT PROPOSAL · ↓ CSV
      </div>

      {/* ADD JOB MODAL */}
      {showAdd && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:"16px",padding:"32px",width:"520px",maxWidth:"92vw"}}>
            <h2 style={{color:"#e8e4dc",fontFamily:"sans-serif",fontWeight:800,margin:"0 0 24px",fontSize:"20px"}}>Add Upwork Job</h2>
            <div style={{marginBottom:"16px"}}>
              <label style={{color:"#555",fontSize:"10px",letterSpacing:"0.15em",display:"block",marginBottom:"6px"}}>JOB URL</label>
              <input value={newJob.url} onChange={e=>setNewJob({...newJob,url:e.target.value})} placeholder="https://upwork.com/jobs/…"
                style={{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"8px",color:"#e8e4dc",padding:"10px 12px",fontSize:"12px",outline:"none"}}/>
            </div>
            <div style={{marginBottom:"16px"}}>
              <label style={{color:"#555",fontSize:"10px",letterSpacing:"0.15em",display:"block",marginBottom:"6px"}}>CONNECTS REQUIRED</label>
              <input value={newJob.connects} onChange={e=>setNewJob({...newJob,connects:e.target.value})} placeholder="e.g. 6"
                style={{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"8px",color:"#e8e4dc",padding:"10px 12px",fontSize:"12px",outline:"none"}}/>
            </div>
            <div style={{marginBottom:"24px"}}>
              <label style={{color:"#555",fontSize:"10px",letterSpacing:"0.15em",display:"block",marginBottom:"6px"}}>PASTE JOB POST TEXT</label>
              <textarea value={newJob.jobText} onChange={e=>setNewJob({...newJob,jobText:e.target.value})} rows={6} placeholder="Paste the full Upwork job description here…"
                style={{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"8px",color:"#e8e4dc",padding:"10px 12px",fontSize:"12px",outline:"none",resize:"vertical",lineHeight:"1.6"}}/>
            </div>
            <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAdd(false)} style={{background:"transparent",color:"#555",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",cursor:"pointer"}}>Cancel</button>
              <button onClick={addJob} disabled={!newJob.jobText}
                style={{background:newJob.jobText?"#e8e4dc":"#1a1a1a",color:newJob.jobText?"#0d0d0d":"#333",border:"none",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:700,cursor:newJob.jobText?"pointer":"not-allowed"}}>
                Add Job →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* API KEY MODAL */}
      {showKey && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:"16px",padding:"32px",width:"500px",maxWidth:"92vw"}}>
            <h2 style={{color:"#e8e4dc",fontFamily:"sans-serif",fontWeight:800,margin:"0 0 8px",fontSize:"18px"}}>Anthropic API Key</h2>
            <p style={{color:"#555",fontSize:"12px",marginBottom:"20px",lineHeight:"1.6"}}>
              Stored only in your browser. Get yours at{" "}
              <a href="https://console.anthropic.com" target="_blank" style={{color:"#56ccf2"}}>console.anthropic.com</a> → API Keys.
            </p>
            <input value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-api03-…" type="password"
              style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"8px",color:"#e8e4dc",padding:"12px",fontSize:"13px",fontFamily:"monospace",outline:"none",marginBottom:"20px"}}/>
            <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowKey(false)} style={{background:"transparent",color:"#555",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{ localStorage.setItem("upwork_anthropic_key",keyDraft); setShowKey(false); toast$("API key saved","success"); }} disabled={!keyDraft}
                style={{background:keyDraft?"#e8e4dc":"#1a1a1a",color:keyDraft?"#0d0d0d":"#333",border:"none",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:700,cursor:keyDraft?"pointer":"not-allowed"}}>
                Save Key →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* AGENCY MODAL */}
      {showAgency && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:"16px",padding:"32px",width:"600px",maxWidth:"92vw"}}>
            <h2 style={{color:"#e8e4dc",fontFamily:"sans-serif",fontWeight:800,margin:"0 0 8px",fontSize:"18px"}}>Agency Profile</h2>
            <p style={{color:"#555",fontSize:"12px",marginBottom:"20px",lineHeight:"1.6"}}>Paste your agency bio, specialisms, and differentiators. Claude uses this when writing proposals.</p>
            <textarea value={agencyDraft} onChange={e=>setAgencyDraft(e.target.value)} rows={10}
              style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"10px",color:"#e8e4dc",padding:"14px",fontSize:"12px",fontFamily:"monospace",lineHeight:"1.7",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"20px"}}>
              <button onClick={()=>setShowAgency(false)} style={{background:"transparent",color:"#555",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{ localStorage.setItem("upwork_agency_context",agencyDraft); setAgency(agencyDraft); setShowAgency(false); toast$("Agency profile saved","success"); }}
                style={{background:"#e8e4dc",color:"#0d0d0d",border:"none",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:700,cursor:"pointer"}}>
                Save →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* PROPOSAL MODAL */}
      {showProposal && (
        <ProposalModal
          row={showProposal}
          agencyContext={agency}
          onClose={() => setShowProposal(null)}
          onSave={text => { updateField(showProposal.id, "proposal", text); setShowProposal(null); toast$("Proposal saved","success"); }}
        />
      )}

      {toast && <Toast message={toast.msg} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
