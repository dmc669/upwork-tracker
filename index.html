<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upwork Bid Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;font-family:'DM Mono',monospace;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ANTHROPIC_KEY = "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";
const ANTHROPIC_MODEL = "claude-sonnet-4-6";

const HEADERS = ["id","date","url","jobText","claudeSummary","claudeHours","complexity","claudePricing","smeHours","bdPrice","connects","proposal","notes","status"];
const STATUS_FLOW = ["New","Under Review","SME Assessed","Proposal Sent","Won","Lost"];
const STATUS_COLORS = {
  "New":           {bg:"#1a1a2e",text:"#7c83ff",border:"#2d2d5e"},
  "Under Review":  {bg:"#1a2a1a",text:"#6fcf97",border:"#2d4d2d"},
  "SME Assessed":  {bg:"#2a1a0e",text:"#f2994a",border:"#4d3520"},
  "Proposal Sent": {bg:"#0e1a2a",text:"#56ccf2",border:"#204050"},
  "Won":           {bg:"#0a2a0a",text:"#27ae60",border:"#1a4d1a"},
  "Lost":          {bg:"#2a0a0a",text:"#eb5757",border:"#4d1a1a"},
};
const CX = {"Low":"#6fcf97","Medium":"#f2994a","High":"#eb5757","—":"#555"};
const LS_KEY = "upwork_tracker_v4";

const lsSave = rows => { try { localStorage.setItem(LS_KEY, JSON.stringify(rows)); } catch(e) {} };
const lsLoad = () => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : []; } catch(e) { return []; } };

const callClaude = async (prompt) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model: ANTHROPIC_MODEL, max_tokens: 1024, messages: [{ role: "user", content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || "").join("").trim();
};

const { useState, useEffect, useCallback, useRef } = React;

function StatusBadge({ status, onChange }) {
  const [open, setOpen] = useState(false);
  const c = STATUS_COLORS[status] || STATUS_COLORS["New"];
  return (
    <div style={{ position:"relative" }}>
      <button onClick={() => setOpen(!open)} style={{ background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:"20px", padding:"3px 10px", fontSize:"11px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:"pointer", whiteSpace:"nowrap" }}>{status} ▾</button>
      {open && (
        <div style={{ position:"absolute", top:"28px", left:0, zIndex:99, background:"#141414", border:"1px solid #2a2a2a", borderRadius:"8px", overflow:"hidden", boxShadow:"0 8px 32px rgba(0,0,0,.6)", minWidth:"140px" }}>
          {STATUS_FLOW.map(s => {
            const sc = STATUS_COLORS[s];
            return <button key={s} onClick={() => { onChange(s); setOpen(false); }} style={{ display:"block", width:"100%", textAlign:"left", background:s===status?sc.bg:"transparent", color:sc.text, border:"none", padding:"7px 14px", fontSize:"11px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:"pointer" }}>{s}</button>;
          })}
        </div>
      )}
    </div>
  );
}

function EditableCell({ value, onChange, placeholder="—", multiline=false }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const save = () => { onChange(draft); setEditing(false); };
  const s = { background:"#1a1a1a", color:"#e8e4dc", border:"1px solid #444", borderRadius:"6px", padding:"6px 8px", fontSize:"12px", fontFamily:"'DM Mono',monospace", width:"100%", outline:"none", resize:"vertical", boxSizing:"border-box" };
  if (editing) return multiline
    ? <textarea autoFocus rows={3} style={s} value={draft} onChange={e => setDraft(e.target.value)} onBlur={save}/>
    : <input autoFocus style={s} value={draft} onChange={e => setDraft(e.target.value)} onBlur={save} onKeyDown={e => e.key === "Enter" && save()}/>;
  return (
    <div onClick={() => { setDraft(value); setEditing(true); }}
      style={{ cursor:"text", minHeight:"20px", color:value?"#e8e4dc":"#444", fontSize:"12px", fontFamily:"'DM Mono',monospace", lineHeight:"1.5", padding:"2px 4px", borderRadius:"4px" }}
      onMouseEnter={e => e.currentTarget.style.background = "#1e1e1e"}
      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
      {value || placeholder}
    </div>
  );
}

function Toast({ message, type="success", onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  const col = type === "error" ? "#eb5757" : "#27ae60";
  return (
    <div style={{ position:"fixed", bottom:"28px", left:"50%", transform:"translateX(-50%)", background:"#1e1e1e", border:"1px solid #2a2a2a", color:"#e8e4dc", padding:"10px 22px", borderRadius:"10px", fontSize:"12px", fontFamily:"'DM Mono',monospace", zIndex:9999, boxShadow:"0 4px 24px rgba(0,0,0,.5)", display:"flex", alignItems:"center", gap:"8px" }}>
      <span style={{ color:col }}>{type === "error" ? "✕" : "✓"}</span>{message}
    </div>
  );
}

function ProposalModal({ row, agencyContext, onClose, onSave }) {
  const [text, setText] = useState(row.proposal || "");
  const [loading, setLoading] = useState(!row.proposal);

  const generate = useCallback(async () => {
    setLoading(true); setText("");
    try {
      const result = await callClaude(
        `You are a senior bid writer for an automation consultancy. Write a concise, persuasive Upwork proposal.\n\nAGENCY CONTEXT:\n${agencyContext}\n\nJOB POST:\n${row.jobText}\n\n${row.claudeSummary ? `INTERNAL ANALYSIS: ${row.claudeSummary} | Hours: ${row.claudeHours} | Complexity: ${row.complexity}` : ""}\n\nRULES:\n- Open with a hook that shows you understand their specific problem\n- 2-3 short paragraphs, conversational but professional\n- Reference relevant agency capabilities naturally\n- End with a clear call to action or one smart qualifying question\n- Do NOT mention rates or pricing\n- No bullet points\n- 150-200 words\n\nReturn only the proposal text.`
      );
      setText(result);
    } catch(e) { setText("Error: " + e.message); }
    setLoading(false);
  }, [row, agencyContext]);

  useEffect(() => { if (!row.proposal) generate(); }, []);

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
      <div style={{ background:"#111", border:"1px solid #2a2a2a", borderRadius:"16px", padding:"32px", width:"620px", maxWidth:"92vw", maxHeight:"90vh", overflow:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"20px" }}>
          <div>
            <h2 style={{ color:"#e8e4dc", fontFamily:"'Syne',sans-serif", fontWeight:800, margin:"0 0 4px", fontSize:"18px" }}>Proposal Draft</h2>
            <div style={{ color:"#555", fontSize:"11px" }}>{row.url || "No URL set"}</div>
          </div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#555", fontSize:"20px", cursor:"pointer" }}>×</button>
        </div>
        {loading
          ? <div style={{ display:"flex", alignItems:"center", gap:"12px", padding:"40px 0", justifyContent:"center" }}>
              <div style={{ width:"18px", height:"18px", border:"2px solid #2a2a2a", borderTop:"2px solid #7c83ff", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>
              <span style={{ color:"#555", fontSize:"12px" }}>Writing proposal…</span>
            </div>
          : <textarea value={text} onChange={e => setText(e.target.value)} rows={12} style={{ width:"100%", background:"#0d0d0d", border:"1px solid #2a2a2a", borderRadius:"10px", color:"#e8e4dc", padding:"16px", fontSize:"13px", fontFamily:"'DM Mono',monospace", lineHeight:"1.8", outline:"none", resize:"vertical", boxSizing:"border-box" }}/>
        }
        <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end", marginTop:"20px", flexWrap:"wrap" }}>
          <button onClick={onClose} style={{ background:"transparent", color:"#555", border:"1px solid #2a2a2a", borderRadius:"8px", padding:"8px 18px", fontSize:"12px", fontFamily:"'DM Mono',monospace", cursor:"pointer" }}>Cancel</button>
          <button onClick={generate} disabled={loading} style={{ background:"#1e1e3a", color:"#7c83ff", border:"1px solid #2d2d5e", borderRadius:"8px", padding:"8px 18px", fontSize:"12px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:"pointer" }}>↺ Regenerate</button>
          <button onClick={() => navigator.clipboard?.writeText(text)} style={{ background:"#111", color:"#56ccf2", border:"1px solid #1a3040", borderRadius:"8px", padding:"8px 18px", fontSize:"12px", fontFamily:"'DM Mono',monospace", cursor:"pointer" }}>⎘ Copy</button>
          <button onClick={() => { onSave(text); onClose(); }} disabled={!text || loading} style={{ background:text&&!loading?"#e8e4dc":"#1a1a1a", color:text&&!loading?"#0d0d0d":"#333", border:"none", borderRadius:"8px", padding:"8px 20px", fontSize:"12px", fontFamily:"'Syne',sans-serif", fontWeight:700, cursor:text&&!loading?"pointer":"not-allowed" }}>Save Proposal →</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [rows, setRows]                   = useState(() => lsLoad());
  const [expandedRow, setExpandedRow]     = useState(null);
  const [loadingId, setLoadingId]         = useState(null);
  const [showAddModal, setShowAddModal]   = useState(false);
  const [proposalRow, setProposalRow]     = useState(null);
  const [newJob, setNewJob]               = useState({ url:"", jobText:"", connects:"" });
  const [toast, setToast]                 = useState(null);
  const [agencyContext, setAgencyContext] = useState(() => localStorage.getItem("upwork_agency_context") || "");
  const [showContextEditor, setShowContextEditor] = useState(false);

  const showToast = (msg, type="success") => setToast({ msg, type });

  const updateRows = (updated) => { setRows(updated); lsSave(updated); };

  const updateRow = (id, field, value) => {
    updateRows(rows.map(r => r.id === id ? { ...r, [field]: value } : r));
  };

  const runClaude = async (row) => {
    setLoadingId(row.id);
    try {
      const result = await callClaude(
        `Analyse this Upwork job post and return ONLY a raw JSON object with these keys:\n- "summary": 1-2 sentence plain English summary\n- "hours": estimated effort e.g. "20-35 hrs"\n- "complexity": exactly one of: Low, Medium, High\n- "pricing": suggested hourly rate e.g. "$30-45/hr"\n\nJob post:\n${row.jobText}\n\nReturn ONLY the JSON object, no markdown, no explanation.`
      );
      const parsed = JSON.parse(result.replace(/```json|```/g, "").trim());
      const updated = rows.map(r => r.id === row.id
        ? { ...r, claudeSummary:parsed.summary||"", claudeHours:parsed.hours||"", complexity:parsed.complexity||"—", claudePricing:parsed.pricing||"", status:"Under Review" }
        : r
      );
      updateRows(updated);
      showToast("Analysis complete");
    } catch(e) {
      showToast("Analysis failed: " + e.message, "error");
    }
    setLoadingId(null);
  };

  const addJob = () => {
    const nr = {
      id: String(Date.now()),
      date: new Date().toISOString().slice(0,16).replace("T"," "),
      url: newJob.url, jobText: newJob.jobText,
      claudeSummary:"", claudeHours:"", complexity:"—", claudePricing:"",
      smeHours:"", bdPrice:"", connects: newJob.connects,
      proposal:"", notes:"", status:"New"
    };
    updateRows([nr, ...rows]);
    setNewJob({ url:"", jobText:"", connects:"" });
    setShowAddModal(false);
    showToast("Job added");
  };

  const downloadCSV = () => {
    const EXPORT_HEADERS = ["Date","URL","Job Post","Claude Summary","Est. Hours","Complexity","Rate Range","SME Hours","BD Price","Connects","Proposal","Notes","Status"];
    const FIELDS = ["date","url","jobText","claudeSummary","claudeHours","complexity","claudePricing","smeHours","bdPrice","connects","proposal","notes","status"];
    const esc = v => `"${String(v||"").replace(/"/g,'""')}"`;
    const lines = [EXPORT_HEADERS.map(esc).join(","), ...rows.map(r => FIELDS.map(f => esc(r[f])).join(","))];
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([lines.join("\n")], { type:"text/csv;charset=utf-8;" }));
    a.download = `upwork-tracker-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast("CSV downloaded");
  };

  const saveAgencyContext = ctx => {
    localStorage.setItem("upwork_agency_context", ctx);
    setAgencyContext(ctx);
    setShowContextEditor(false);
    showToast("Agency profile saved");
  };

  const btn = { border:"1px solid #2a2a2a", borderRadius:"8px", padding:"7px 14px", fontSize:"11px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:"6px", whiteSpace:"nowrap" };
  const COLS = [{l:"DATE",w:"105px"},{l:"URL",w:"90px"},{l:"A — JOB POST",w:"190px"},{l:"B — SUMMARY",w:"190px"},{l:"C — HOURS",w:"85px"},{l:"COMPLEXITY",w:"90px"},{l:"D — RATE",w:"95px"},{l:"E — SME HRS",w:"85px"},{l:"F — BD PRICE",w:"90px"},{l:"CONNECTS",w:"80px"},{l:"PROPOSAL",w:"90px"},{l:"NOTES",w:"155px"},{l:"G — STATUS",w:"125px"},{l:"AI",w:"55px"}];

  return (
    <div style={{ minHeight:"100vh", background:"#0d0d0d", padding:"32px 24px" }}>

      {/* Header */}
      <div style={{ marginBottom:"28px", display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:"16px" }}>
        <div>
          <div style={{ color:"#444", fontSize:"11px", letterSpacing:"0.2em", marginBottom:"6px" }}>AUTOMATION CONSULTANCY</div>
          <h1 style={{ color:"#e8e4dc", fontFamily:"'Syne',sans-serif", fontSize:"26px", fontWeight:800, letterSpacing:"-0.02em" }}>Upwork Bid Tracker</h1>
          <div style={{ color:"#555", fontSize:"11px", marginTop:"6px" }}>{rows.length} jobs · saved locally</div>
        </div>
        <div style={{ display:"flex", gap:"10px", alignItems:"center", flexWrap:"wrap" }}>
          <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
            {STATUS_FLOW.map(s => (
              <span key={s} style={{ background:STATUS_COLORS[s].bg, color:STATUS_COLORS[s].text, border:`1px solid ${STATUS_COLORS[s].border}`, borderRadius:"20px", padding:"3px 10px", fontSize:"10px", fontWeight:600 }}>
                {rows.filter(r => r.status === s).length} {s}
              </span>
            ))}
          </div>
          <div style={{ display:"flex", gap:"8px" }}>
            <button onClick={() => setShowContextEditor(true)} style={{ ...btn, background:agencyContext?"#111":"#2a1a0e", color:agencyContext?"#888":"#f2994a", borderColor:agencyContext?"#2a2a2a":"#4d3520" }}>
              {agencyContext ? "✎ Agency Profile" : "⚠ Set Agency Profile"}
            </button>
            <button onClick={downloadCSV} style={{ ...btn, background:"#111", color:"#56ccf2", borderColor:"#1a3040" }}>↓ CSV</button>
            <button onClick={() => setShowAddModal(true)} style={{ ...btn, background:"#e8e4dc", color:"#0d0d0d", border:"none", fontFamily:"'Syne',sans-serif", fontSize:"12px" }}>+ Add Job</button>
          </div>
        </div>
      </div>

      {/* Table */}
      <div style={{ overflowX:"auto", borderRadius:"12px", border:"1px solid #1e1e1e" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"1500px" }}>
          <thead>
            <tr style={{ background:"#111" }}>
              {COLS.map(c => <th key={c.l} style={{ padding:"10px 12px", textAlign:"left", fontSize:"9px", color:"#555", letterSpacing:"0.15em", fontWeight:600, borderBottom:"1px solid #1e1e1e", width:c.w, whiteSpace:"nowrap" }}>{c.l}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={14} style={{ padding:"48px", textAlign:"center", color:"#333", fontSize:"13px" }}>No jobs yet — click + Add Job to get started</td></tr>
            )}
            {rows.map((row, i) => (
              <React.Fragment key={row.id}>
                <tr style={{ background:i%2===0?"#0d0d0d":"#101010", borderBottom:expandedRow===row.id?"none":"1px solid #181818" }}>
                  <td style={{ padding:"10px 12px", color:"#444", fontSize:"11px", whiteSpace:"nowrap" }}>{row.date}</td>
                  <td style={{ padding:"10px 12px" }}><EditableCell value={row.url} onChange={v => updateRow(row.id,"url",v)} placeholder="paste URL"/></td>
                  <td style={{ padding:"10px 12px" }}>
                    <div style={{ cursor:"pointer", color:row.jobText?"#e8e4dc":"#444", fontSize:"12px", lineHeight:"1.4" }} onClick={() => setExpandedRow(expandedRow===row.id?null:row.id)}>
                      {row.jobText ? row.jobText.slice(0,80)+(row.jobText.length>80?"…":"") : "click to add text"}
                    </div>
                  </td>
                  <td style={{ padding:"10px 12px" }}><EditableCell value={row.claudeSummary} onChange={v => updateRow(row.id,"claudeSummary",v)} placeholder="run AI →" multiline/></td>
                  <td style={{ padding:"10px 12px" }}><span style={{ color:row.claudeHours?"#c9b8ff":"#333", fontSize:"12px" }}>{row.claudeHours||"—"}</span></td>
                  <td style={{ padding:"10px 12px" }}><span style={{ color:CX[row.complexity]||"#555", fontSize:"11px", fontWeight:600 }}>{row.complexity||"—"}</span></td>
                  <td style={{ padding:"10px 12px" }}><span style={{ color:row.claudePricing?"#6fcf97":"#333", fontSize:"12px" }}>{row.claudePricing||"—"}</span></td>
                  <td style={{ padding:"10px 12px" }}><EditableCell value={row.smeHours} onChange={v => updateRow(row.id,"smeHours",v)} placeholder="hrs"/></td>
                  <td style={{ padding:"10px 12px" }}><EditableCell value={row.bdPrice} onChange={v => updateRow(row.id,"bdPrice",v)} placeholder="e.g. $40/hr"/></td>
                  <td style={{ padding:"10px 12px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                      <EditableCell value={row.connects} onChange={v => updateRow(row.id,"connects",v)} placeholder="—"/>
                      {row.connects && <span style={{ color:"#f2994a", fontSize:"10px" }}>🔗</span>}
                    </div>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <button onClick={() => setProposalRow(row)} disabled={!row.jobText} style={{ background:row.proposal?"#0a2a0a":"#1e1e3a", color:row.proposal?"#27ae60":"#7c83ff", border:`1px solid ${row.proposal?"#1a4d1a":"#2d2d5e"}`, borderRadius:"6px", padding:"4px 10px", fontSize:"10px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:row.jobText?"pointer":"not-allowed", whiteSpace:"nowrap" }}>
                      {row.proposal ? "✓ Edit" : "✦ Draft"}
                    </button>
                  </td>
                  <td style={{ padding:"10px 12px" }}><EditableCell value={row.notes} onChange={v => updateRow(row.id,"notes",v)} placeholder="add note…" multiline/></td>
                  <td style={{ padding:"10px 12px" }}><StatusBadge status={row.status} onChange={v => updateRow(row.id,"status",v)}/></td>
                  <td style={{ padding:"10px 12px" }}>
                    <button onClick={() => runClaude(row)} disabled={!row.jobText || loadingId===row.id} style={{ background:loadingId===row.id?"#1a1a2e":"#1e1e3a", color:loadingId===row.id?"#7c83ff88":"#7c83ff", border:"1px solid #2d2d5e", borderRadius:"6px", padding:"5px 10px", fontSize:"10px", fontFamily:"'DM Mono',monospace", fontWeight:600, cursor:row.jobText&&loadingId!==row.id?"pointer":"not-allowed" }}>
                      {loadingId===row.id ? "…" : "✦"}
                    </button>
                  </td>
                </tr>

                {expandedRow===row.id && (
                  <tr style={{ background:"#0a0a12", borderBottom:"1px solid #1e1e1e" }}>
                    <td colSpan={14} style={{ padding:"20px" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"24px" }}>
                        <div>
                          <div style={{ color:"#555", fontSize:"9px", letterSpacing:"0.15em", marginBottom:"8px" }}>FULL JOB POST</div>
                          <textarea value={row.jobText} onChange={e => updateRow(row.id,"jobText",e.target.value)} rows={7}
                            style={{ width:"100%", background:"#111", border:"1px solid #222", borderRadius:"8px", color:"#e8e4dc", fontSize:"12px", fontFamily:"'DM Mono',monospace", padding:"12px", resize:"vertical", outline:"none", lineHeight:"1.7" }}/>
                        </div>
                        <div>
                          <div style={{ color:"#555", fontSize:"9px", letterSpacing:"0.15em", marginBottom:"12px" }}>PIPELINE CHECKLIST</div>
                          {[
                            { l:"BD added job post",          d:!!row.jobText },
                            { l:"Claude analysis run",        d:!!row.claudeSummary },
                            { l:"Connects logged",            d:!!row.connects },
                            { l:"SME reviewed & added hours", d:!!row.smeHours },
                            { l:"BD set final price",         d:!!row.bdPrice },
                            { l:"Proposal drafted",           d:!!row.proposal },
                            { l:"Proposal submitted",         d:["Proposal Sent","Won","Lost"].includes(row.status) },
                          ].map(step => (
                            <div key={step.l} style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"10px" }}>
                              <span style={{ width:"16px", height:"16px", borderRadius:"4px", background:step.d?"#0a2a0a":"#1a1a1a", border:`1px solid ${step.d?"#27ae60":"#2a2a2a"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"9px", color:step.d?"#27ae60":"#333", flexShrink:0 }}>{step.d?"✓":""}</span>
                              <span style={{ color:step.d?"#666":"#444", fontSize:"12px", textDecoration:step.d?"line-through":"none" }}>{step.l}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ color:"#222", fontSize:"10px", marginTop:"16px", textAlign:"center", letterSpacing:"0.1em" }}>
        CLICK ANY CELL TO EDIT · CLICK JOB SNIPPET TO EXPAND · ✦ AI ANALYSE · ✦ DRAFT PROPOSAL · ↓ EXPORT CSV
      </div>

      {/* Add Job Modal */}
      {showAddModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
          <div style={{ background:"#111", border:"1px solid #2a2a2a", borderRadius:"16px", padding:"32px", width:"540px", maxWidth:"92vw" }}>
            <h2 style={{ color:"#e8e4dc", fontFamily:"'Syne',sans-serif", fontWeight:800, margin:"0 0 24px", fontSize:"20px" }}>Add Upwork Job</h2>
            {[{label:"JOB URL", key:"url", ph:"https://upwork.com/jobs/…"},{label:"CONNECTS REQUIRED", key:"connects", ph:"e.g. 6"}].map(f => (
              <div key={f.key} style={{ marginBottom:"16px" }}>
                <label style={{ color:"#555", fontSize:"10px", letterSpacing:"0.15em", display:"block", marginBottom:"6px" }}>{f.label}</label>
                <input value={newJob[f.key]} onChange={e => setNewJob({...newJob,[f.key]:e.target.value})} placeholder={f.ph}
                  style={{ width:"100%", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:"8px", color:"#e8e4dc", padding:"10px 12px", fontSize:"12px", fontFamily:"'DM Mono',monospace", outline:"none" }}/>
              </div>
            ))}
            <div style={{ marginBottom:"24px" }}>
              <label style={{ color:"#555", fontSize:"10px", letterSpacing:"0.15em", display:"block", marginBottom:"6px" }}>PASTE JOB POST TEXT</label>
              <textarea value={newJob.jobText} onChange={e => setNewJob({...newJob,jobText:e.target.value})} rows={6} placeholder="Paste the full Upwork job description here…"
                style={{ width:"100%", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:"8px", color:"#e8e4dc", padding:"10px 12px", fontSize:"12px", fontFamily:"'DM Mono',monospace", outline:"none", resize:"vertical", lineHeight:"1.6" }}/>
            </div>
            <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end" }}>
              <button onClick={() => setShowAddModal(false)} style={{ background:"transparent", color:"#555", border:"1px solid #2a2a2a", borderRadius:"8px", padding:"8px 20px", fontSize:"12px", fontFamily:"'DM Mono',monospace", cursor:"pointer" }}>Cancel</button>
              <button onClick={addJob} disabled={!newJob.jobText} style={{ background:newJob.jobText?"#e8e4dc":"#1a1a1a", color:newJob.jobText?"#0d0d0d":"#333", border:"none", borderRadius:"8px", padding:"8px 20px", fontSize:"12px", fontFamily:"'Syne',sans-serif", fontWeight:700, cursor:newJob.jobText?"pointer":"not-allowed" }}>Add Job →</button>
            </div>
          </div>
        </div>
      )}

      {/* Agency Profile Editor */}
      {showContextEditor && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
          <div style={{ background:"#111", border:"1px solid #2a2a2a", borderRadius:"16px", padding:"32px", width:"620px", maxWidth:"92vw" }}>
            <h2 style={{ color:"#e8e4dc", fontFamily:"'Syne',sans-serif", fontWeight:800, margin:"0 0 8px", fontSize:"18px" }}>Agency Profile</h2>
            <p style={{ color:"#555", fontSize:"12px", marginBottom:"20px", lineHeight:"1.6" }}>Paste your agency bio, specialisms, notable work, and differentiators. Claude uses this when writing proposals.</p>
            <textarea value={agencyContext} onChange={e => setAgencyContext(e.target.value)} rows={12}
              style={{ width:"100%", background:"#0d0d0d", border:"1px solid #2a2a2a", borderRadius:"10px", color:"#e8e4dc", padding:"14px", fontSize:"12px", fontFamily:"'DM Mono',monospace", lineHeight:"1.7", outline:"none", resize:"vertical", boxSizing:"border-box" }}/>
            <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end", marginTop:"20px" }}>
              <button onClick={() => setShowContextEditor(false)} style={{ background:"transparent", color:"#555", border:"1px solid #2a2a2a", borderRadius:"8px", padding:"8px 20px", fontSize:"12px", fontFamily:"'DM Mono',monospace", cursor:"pointer" }}>Cancel</button>
              <button onClick={() => saveAgencyContext(agencyContext)} style={{ background:"#e8e4dc", color:"#0d0d0d", border:"none", borderRadius:"8px", padding:"8px 20px", fontSize:"12px", fontFamily:"'Syne',sans-serif", fontWeight:700, cursor:"pointer" }}>Save Profile →</button>
            </div>
          </div>
        </div>
      )}

      {proposalRow && (
        <ProposalModal
          key={proposalRow.id}
          row={proposalRow}
          agencyContext={agencyContext}
          onClose={() => setProposalRow(null)}
          onSave={text => { updateRow(proposalRow.id, "proposal", text); showToast("Proposal saved"); }}
        />
      )}

      {toast && <Toast message={toast.msg} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
